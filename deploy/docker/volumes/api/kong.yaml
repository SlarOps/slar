_format_version: '2.1'
_transform: true

###
### Consumers / Users
###
consumers:
  - username: DASHBOARD

###
### API Routes
###
services:
  ## NextAuth - Must be before api-service to handle /api/auth/*
  - name: nextauth-service
    # _comment: 'NextAuth: /api/auth/* -> http://web:3000/api/auth/*'
    url: http://web:3000/
    routes:
      - name: nextauth-routes
        strip_path: false
        paths:
          - /api/auth
    plugins:
      - name: cors

  ## Next.js Runtime Config - Must be before api-service
  - name: nextjs-config-service
    # _comment: 'Config: /api/config -> http://web:3000/api/config'
    url: http://web:3000/
    routes:
      - name: nextjs-config-route
        strip_path: false
        paths:
          - /api/config
    plugins:
      - name: cors

  ## API Service - Main Backend API
  - name: api-service
    # _comment: 'API: /api/* -> http://api:8081/*'
    url: http://api:8081/
    routes:
      - name: api-routes
        strip_path: true
        paths:
          - /api
    plugins:
      - name: cors

  ## AI Service
  - name: ai-service
    # _comment: 'AI: /ai/* -> http://ai:8002/*'
    url: http://ai:8002/
    routes:
      - name: ai-routes
        strip_path: true
        paths:
          - /ai/
    plugins:
      - name: cors

  ## WebSocket for AI Chat
  - name: ai-websocket
    # _comment: 'WebSocket: /ws/chat -> ws://ai:8002/ws/chat'
    url: http://ai:8002
    protocol: ws
    routes:
      - name: ai-ws-route
        strip_path: false
        paths:
          - /ws/chat
    plugins:
      - name: cors
  
  ## WebSocket for AI Terminal
  - name: ai-terminal-websocket
    # _comment: 'WebSocket: /ws/terminal?session_id=xxx -> ws://terminal:8003/ws/terminal?session_id=xxx'
    url: http://terminal:8003
    protocol: ws
    routes:
      - name: ai-terminal-ws-route
        strip_path: false
        paths:
          - /ws/terminal
    plugins:
      - name: cors

  ## Web Frontend
  - name: web-service
    #_comment: 'Web: /* -> http://web:3000/*'
    url: http://web:3000/
    routes:
      - name: web-routes
        strip_path: false
        paths:
          - /
    plugins:
      - name: cors
