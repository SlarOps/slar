# Dex IDP Configuration for SLAR
# Documentation: https://dexidp.io/docs/
#
# This is a template - copy to dex-config.local.yaml and configure your connectors

issuer: http://localhost:5556/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

# Token expiry settings
expiry:
  signingKeys: "6h"
  idTokens: "24h"
  refreshTokens:
    validIfNotUsedFor: "168h"   # 7 days
    absoluteLifetime: "720h"    # 30 days

oauth2:
  # Skip the approval screen (recommended for internal apps)
  skipApprovalScreen: true
  responseTypes:
    - code
    - token
    - id_token

# Static clients - SLAR applications
staticClients:
  - id: slar-web
    name: SLAR Web Application
    secret: slar-dex-secret  # Change in production!
    redirectURIs:
      - http://localhost:3001/api/auth/callback/oidc
      - http://localhost:8000/api/auth/callback/oidc

# =============================================================================
# IDENTITY PROVIDER CONNECTORS
# Uncomment and configure at least ONE connector below
# =============================================================================

connectors:
  # ---------------------------------------------------------------------------
  # GOOGLE WORKSPACE / GMAIL
  # https://dexidp.io/docs/connectors/google/
  # 
  # Setup:
  # 1. Go to Google Cloud Console > APIs & Services > Credentials
  # 2. Create OAuth 2.0 Client ID (Web application)
  # 3. Add redirect URI: http://localhost:5556/dex/callback
  # ---------------------------------------------------------------------------
  # - type: google
  #   id: google
  #   name: Google
  #   config:
  #     clientID: YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com
  #     clientSecret: YOUR_GOOGLE_CLIENT_SECRET
  #     redirectURI: http://localhost:5556/dex/callback
  #     # IMPORTANT: Restrict to your domain(s) for security
  #     hostedDomains:
  #       - yourcompany.com

  # ---------------------------------------------------------------------------
  # GITHUB / GITHUB ENTERPRISE
  # https://dexidp.io/docs/connectors/github/
  #
  # Setup:
  # 1. Go to GitHub > Settings > Developer settings > OAuth Apps
  # 2. Create new OAuth App
  # 3. Authorization callback URL: http://localhost:5556/dex/callback
  # ---------------------------------------------------------------------------
  # - type: github
  #   id: github
  #   name: GitHub
  #   config:
  #     clientID: YOUR_GITHUB_CLIENT_ID
  #     clientSecret: YOUR_GITHUB_CLIENT_SECRET
  #     redirectURI: http://localhost:5556/dex/callback
  #     # Restrict to specific organizations (recommended)
  #     orgs:
  #       - name: your-org
  #         teams:
  #           - engineering
  #           - devops

  # ---------------------------------------------------------------------------
  # MICROSOFT / AZURE AD
  # https://dexidp.io/docs/connectors/microsoft/
  # ---------------------------------------------------------------------------
  # - type: microsoft
  #   id: microsoft
  #   name: Microsoft
  #   config:
  #     clientID: YOUR_AZURE_CLIENT_ID
  #     clientSecret: YOUR_AZURE_CLIENT_SECRET
  #     redirectURI: http://localhost:5556/dex/callback
  #     tenant: YOUR_TENANT_ID  # or "organizations" or "consumers"

  # ---------------------------------------------------------------------------
  # LDAP / ACTIVE DIRECTORY
  # https://dexidp.io/docs/connectors/ldap/
  # ---------------------------------------------------------------------------
  # - type: ldap
  #   id: ldap
  #   name: LDAP
  #   config:
  #     host: ldap.example.com:636
  #     insecureNoSSL: false
  #     insecureSkipVerify: false
  #     bindDN: cn=admin,dc=example,dc=com
  #     bindPW: admin-password
  #     userSearch:
  #       baseDN: ou=Users,dc=example,dc=com
  #       filter: "(objectClass=person)"
  #       username: uid
  #       idAttr: uid
  #       emailAttr: mail
  #       nameAttr: cn
  #     groupSearch:
  #       baseDN: ou=Groups,dc=example,dc=com
  #       filter: "(objectClass=groupOfNames)"
  #       userMatchers:
  #         - userAttr: DN
  #           groupAttr: member
  #       nameAttr: cn

  # ---------------------------------------------------------------------------
  # UPSTREAM OIDC (Okta, Auth0, Keycloak, etc.)
  # https://dexidp.io/docs/connectors/oidc/
  # ---------------------------------------------------------------------------
  # - type: oidc
  #   id: okta
  #   name: Okta
  #   config:
  #     issuer: https://your-org.okta.com
  #     clientID: YOUR_OKTA_CLIENT_ID
  #     clientSecret: YOUR_OKTA_CLIENT_SECRET
  #     redirectURI: http://localhost:5556/dex/callback
  #     scopes:
  #       - openid
  #       - profile
  #       - email
  #       - groups

